    }
</style>

	<td style="background-color:#008000;">Green</td>
	<td style="background-color:#FFD700;">Gold</td>

</tr>

<tr>

	<td>#023020</td>
</tr>

<tr>

	<td>rgb(255,215,0)</td>
	<td>rgb(255,255,255)</td>

</tr>

<tr>
	<td>hsl(140,100%,50%)</td>
	<td>hsl(60,50%,50%)</td>
	<td>hsl(0,0%,100%)</td>
	<td>hsl(140,100%,25%)</td>
</tr>
</table>

</body>
</html>
